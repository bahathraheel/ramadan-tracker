<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Pro 3D Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#24243e">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
    color: gold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(255, 215, 0, 0.08);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 30px rgba(0,0,0,0.6);
}

button {
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    background: gold;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.completed {
    background: rgba(0, 200, 100, 0.3);
}
</style>
</head>

<body>

<h1>🌙 Ramadan Pro 3D Tracker (India)</h1>
<p id="location">Detecting Location...</p>
<div class="container" id="ramadanContainer"></div>

<script>

let latitude, longitude;
let completedCount = 0;

navigator.geolocation.getCurrentPosition(position => {
    latitude = position.coords.latitude;
    longitude = position.coords.longitude;
    document.getElementById("location").innerText =
        `Location: ${latitude.toFixed(2)}, ${longitude.toFixed(2)}`;
    fetchRamadanTimes();
});

async function fetchRamadanTimes() {
    const year = new Date().getFullYear();
    const response = await fetch(
        `https://api.aladhan.com/v1/calendar?latitude=${latitude}&longitude=${longitude}&method=1&month=3&year=${year}`
    );
    const data = await response.json();
    displayRamadan(data.data);
}

function displayRamadan(days) {
    const container = document.getElementById("ramadanContainer");
    container.innerHTML = "";
    let ramadanCount = 0;

    days.forEach(day => {
        if (day.date.hijri.month.en === "Ramadan") {
            ramadanCount++;

            const card = document.createElement("div");
            card.className = "card";

            const saved = localStorage.getItem("roza" + ramadanCount);
            if (saved === "true") {
                card.classList.add("completed");
                completedCount++;
            }

            card.innerHTML = `
                <h3>Roza ${ramadanCount}</h3>
                <p>${day.date.gregorian.day} ${day.date.gregorian.month.en} ${day.date.gregorian.year}</p>
                <p><b>Sehri:</b> ${day.timings.Fajr}</p>
                <p><b>Iftar:</b> ${day.timings.Maghrib}</p>
                <button onclick="markRoza(${ramadanCount})">Mark Completed</button>
            `;

            container.appendChild(card);
        }
    });
}

function markRoza(day) {
    localStorage.setItem("roza" + day, "true");
    location.reload();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
